<!DOCTYPE html>
<html>
<head>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
<title>Search - Science Against Evolution</title>
</head>
<body bgcolor="#FFCC99">
<center>
<table border="" width="90%"><tr>
<td><img alt="Science Against Evolution" src="images/logo.gif"/></td>
<td><h1 align="CENTER">Science Against Evolution<br/>Site Search</h1></td>
</tr></table>
</center>
<p><a href="index.html">&larr; Home</a></p>
<table bgcolor="#FFFFFF" border=""><tr><td>
<form action="search.html" method="get">
<input name="q" size="40" type="text"/> <input type="submit" value="Search this site"/>
</form>
</td></tr></table>
<div id="status"></div>
<div id="results"></div>
<script>
var INDEX_URL = 'search_index.json';
var siteIndex = null;

function loadIndex() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', INDEX_URL, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      siteIndex = JSON.parse(xhr.responseText);
      document.getElementById('status').innerHTML = siteIndex.length + ' pages indexed.';
      var q = getParam('q');
      if (q) {
        document.querySelector('input[name=q]').value = q;
        doSearch(q);
      }
    } else {
      document.getElementById('status').innerHTML =
        'Search index not found. Run build_search_index.py first.';
    }
  };
  xhr.onerror = function() {
    document.getElementById('status').innerHTML =
      'Search index could not be loaded.';
  };
  xhr.send();
}

function getParam(name) {
  var pairs = window.location.search.slice(1).split('&');
  for (var i = 0; i < pairs.length; i++) {
    var p = pairs[i].split('=');
    if (decodeURIComponent(p[0]) === name) return decodeURIComponent(p[1] || '');
  }
  return '';
}

function doSearch(q) {
  if (!q) q = document.querySelector('input[name=q]').value;
  q = q.trim();
  if (!q || !siteIndex) return;
  var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  var scored = [];
  for (var i = 0; i < siteIndex.length; i++) {
    var page = siteIndex[i];
    var haystack = ((page.title || '') + ' ' + (page.text || '')).toLowerCase();
    var score = 0;
    for (var t = 0; t < terms.length; t++) {
      var re = new RegExp(terms[t].replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var matches = haystack.match(re);
      if (matches) score += matches.length;
    }
    if (score > 0) scored.push({url: page.url, title: page.title,
                                 snippet: page.snippet, score: score});
  }
  scored.sort(function(a, b) { return b.score - a.score; });
  var top = scored.slice(0, 30);
  var div = document.getElementById('results');
  if (!top.length) {
    div.innerHTML = '<p>No results found for <b>' + escHtml(q) + '</b>.</p>';
    return;
  }
  var html = '<p>' + top.length + ' result(s) for <b>' + escHtml(q) + '</b>:</p>';
  html += '<table border="" width="100%">';
  for (var i = 0; i < top.length; i++) {
    html += '<tr><td><a href="' + top[i].url + '">' +
            escHtml(top[i].title || top[i].url) + '</a><br/>' +
            '<small>' + escHtml(top[i].snippet || '') + '</small></td></tr>';
  }
  html += '</table>';
  div.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadIndex();
</script>
</body>
</html>
